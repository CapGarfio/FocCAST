<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>FocCAST - Mapa Interactivo</title>
    <!-- Carga local de Leaflet (rutas absolutas desde la raíz del proyecto) -->
    <link rel='stylesheet' href='file:///C:/Users/glurps/Documents/GitHub/FocCAST/src/gui/resources/leaflet/leaflet.css' />
    <script src='file:///C:/Users/glurps/Documents/GitHub/FocCAST/src/gui/resources/leaflet/leaflet.js'></script>
    <style>
        body, html, #map { margin: 0; padding: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id='map'></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof L !== 'undefined') {
                var map = L.map('map').setView([39.5, -0.5], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                window.map = map;
                console.log('✅ Mapa OSM con Leaflet local.');
            } else {
                console.error('❌ Leaflet local no se cargó.');
            }
        });
    </script>
</body>
</html>
